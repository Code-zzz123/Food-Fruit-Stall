<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Supabase Record Viewer</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <h1>Supabase Record Viewer</h1>
        <p class="subtitle">View records stored in your Supabase table.</p>
      </div>
      <div class="header-actions">
        <nav class="tabs" aria-label="Pages">
          <button id="tabFood" class="tab-btn active" type="button">Food</button>
          <button id="tabBuyer" class="tab-btn" type="button">Buyer</button>
        </nav>
        <button id="refreshBtn" class="btn">Refresh</button>
      </div>
    </header>

    <section id="foodView" class="grid view active">
      <aside class="panel">
        <h2>Records</h2>
        <div id="recordsList" class="list">Loading...</div>
        <hr class="divider" />
        <h3>Add Record</h3>
        <form id="createForm" class="create-form">
          <label class="input-label" for="fruitNameInput">Fruit Name</label>
          <input id="fruitNameInput" name="Fruit Name" type="text" required />

          <label class="input-label" for="colorInput">Color</label>
          <input id="colorInput" name="Color" type="text" />

          <label class="input-label" for="priceInput">Price</label>
          <input id="priceInput" name="price" type="number" min="0" step="0.01" />

          <label class="input-label" for="whereToBuyInput">Where To Buy</label>
          <input id="whereToBuyInput" name="Where To Buy" type="text" placeholder="https://example.com" />

          <button class="btn" id="createBtn" type="submit">Add Record</button>
          <div id="createStatus" class="muted"></div>
        </form>
      </aside>

      <section class="panel" id="detailPanel">
        <h2>Details</h2>
        <div id="recordDetail" class="detail muted">Select a record.</div>
      </section>
    </section>

    <section id="buyerView" class="grid view">
      <aside class="panel">
        <h2>Buyers</h2>
        <div id="buyersList" class="list">Loading...</div>
        <hr class="divider" />
        <h3>Add Buyer</h3>
        <form id="createBuyerForm" class="create-form">
          <label class="input-label" for="buyerNameInput">Buyer Name</label>
          <input id="buyerNameInput" type="text" required />

          <label class="input-label" for="buyerFruitNameInput">Fruit Name</label>
          <input id="buyerFruitNameInput" type="text" required />

          <label class="input-label" for="buyerQuantityInput">Quantity Bought</label>
          <input id="buyerQuantityInput" type="number" min="1" step="1" />

          <button class="btn" id="createBuyerBtn" type="submit">Add Buyer</button>
          <div id="createBuyerStatus" class="muted"></div>
        </form>
      </aside>

      <section class="panel">
        <h2>Buyer Details</h2>
        <div id="buyerDetail" class="detail muted">Select a buyer.</div>
      </section>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
